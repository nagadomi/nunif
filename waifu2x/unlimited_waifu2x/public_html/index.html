<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Waifu2x Premium</title>
<link rel="icon" href="favicon.ico">

<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script defer src="script.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <div class="hero">
    <div class="card">
      <h1>Waifu2x Premium</h1>
      <p class="muted">AI upscale, denoise and enhance directly in browser</p>

      <div class="controls">

        <div class="field">
          <label>Upload Image</label>
          <input type="file" id="file" accept="image/*">
          <span id="paste-button"></span>
        </div>

        <div class="field">
          <label>Model</label>
          <select name="model">
            <option value="swin_unet.art">🎨 swin_unet / art</option>
            <option value="swin_unet.art_scan">🖨 art scan</option>
            <option value="swin_unet.photo">📷 photo</option>
            <option value="cunet.art">🎨 cunet / art</option>
          </select>
        </div>

        <div class="field">
          <label>Denoise</label>
          <select name="noise_level">
            <option value="-1">None</option>
            <option value="0">Low</option>
            <option value="1">Medium</option>
            <option value="2">High</option>
            <option value="3">Highest</option>
          </select>
        </div>

        <div class="field">
          <label>Scale</label>
          <select name="scale">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="4">4x</option>
          </select>
          <span id="scale-comment" class="helper"></span>
        </div>

        <div class="field">
          <label>Tile Size</label>
          <select name="tile_size">
            <option value="64">64</option>
            <option value="256" selected>256</option>
            <option value="400">400</option>
            <option value="640">640</option>
          </select>
          <span id="tile-comment" class="helper"></span>
        </div>

        <div class="field">
          <label>TTA</label>
          <select name="tta">
            <option value="0">0</option>
            <option value="2">2</option>
            <option value="4">4</option>
          </select>
        </div>

        <div class="field">
          <label>Alpha</label>
          <select name="alpha">
            <option value="1">Auto</option>
            <option value="0" selected>Disable</option>
          </select>
        </div>

        <div class="field checkbox">
          <label>
            <input type="checkbox" name="tile_random">
            Shuffle Tiles
          </label>
        </div>

      </div>

      <div class="btns">
        <button type="button" id="start" class="btn primary">Start</button>
        <button type="button" id="stop" class="btn danger">Stop</button>
      </div>

      <div class="status">
        <span id="message">Ready</span>
      </div>
    </div>

    <div class="card side">
      <h3>Tips</h3>
      <p class="muted">
        Use 2x for speed.<br>
        Use 4x for maximum detail.<br>
        256 tile size is balanced.
      </p>
    </div>
  </div>

  <div class="preview">
    <div class="pane">
      <h3>Original</h3>
      <img id="src" src="blank.png" alt="Original preview">
    </div>

    <div class="pane">
      <h3>Enhanced</h3>
      <canvas id="dest" aria-label="Enhanced image preview"></canvas>
    </div>
  </div>

  <div class="footer">
    Powered by nunif / waifu2x
  </div>

</div>
</body>
</html>
